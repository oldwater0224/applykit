<svg width="100%" viewBox="0 0 680 440" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="340" y="30" text-anchor="middle" style="fill:rgb(250, 249, 245);stroke:none;font-family:&quot;Anthropic Sans&quot;, -apple-system, &quot;system-ui&quot;, &quot;Segoe UI&quot;, sans-serif;font-size:14px;font-weight:500">3. 역할 기반 인증 및 라우팅</text>

  <!-- Actors -->
  <g>
    <rect x="30" y="55" width="80" height="36" rx="6" stroke-width="0.5" style="fill:rgb(12, 68, 124);stroke:rgb(133, 183, 235)"/>
    <text x="70" y="77" text-anchor="middle" style="fill:rgb(181, 212, 244);stroke:none;font-family:&quot;Anthropic Sans&quot;, -apple-system, &quot;system-ui&quot;, &quot;Segoe UI&quot;, sans-serif;font-size:14px;font-weight:500">User</text>
  </g>
  <g>
    <rect x="180" y="55" width="100" height="36" rx="6" stroke-width="0.5" style="fill:rgb(8, 80, 65);stroke:rgb(93, 202, 165)"/>
    <text x="230" y="77" text-anchor="middle" style="fill:rgb(159, 225, 203);stroke:none;font-family:&quot;Anthropic Sans&quot;, -apple-system, &quot;system-ui&quot;, &quot;Segoe UI&quot;, sans-serif;font-size:14px;font-weight:500">Middleware</text>
  </g>
  <g>
    <rect x="350" y="55" width="100" height="36" rx="6" stroke-width="0.5" style="fill:rgb(60, 52, 137);stroke:rgb(175, 169, 236)"/>
    <text x="400" y="77" text-anchor="middle" style="fill:rgb(206, 203, 246);stroke:none;font-family:&quot;Anthropic Sans&quot;, -apple-system, &quot;system-ui&quot;, &quot;Segoe UI&quot;, sans-serif;font-size:14px;font-weight:500">Auth Action</text>
  </g>
  <g>
    <rect x="520" y="55" width="120" height="36" rx="6" stroke-width="0.5" style="fill:rgb(113, 43, 19);stroke:rgb(240, 153, 123)"/>
    <text x="580" y="77" text-anchor="middle" style="fill:rgb(245, 196, 179);stroke:none;font-family:&quot;Anthropic Sans&quot;, -apple-system, &quot;system-ui&quot;, &quot;Segoe UI&quot;, sans-serif;font-size:14px;font-weight:500">Supabase Auth</text>
  </g>

  <!-- Lifelines -->
  <line x1="70" y1="91" x2="70" y2="420" stroke-width="1" stroke-dasharray="4 3" style="stroke:rgb(194, 192, 182)"/>
  <line x1="230" y1="91" x2="230" y2="420" stroke-width="1" stroke-dasharray="4 3" style="stroke:rgb(194, 192, 182)"/>
  <line x1="400" y1="91" x2="400" y2="420" stroke-width="1" stroke-dasharray="4 3" style="stroke:rgb(194, 192, 182)"/>
  <line x1="580" y1="91" x2="580" y2="420" stroke-width="1" stroke-dasharray="4 3" style="stroke:rgb(194, 192, 182)"/>

  <!-- Step 1: User accesses protected route -->
  <line x1="70" y1="120" x2="228" y2="120" stroke="#1D9E75" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="149" y="112" style="fill:rgb(194, 192, 182);stroke:none;font-family:&quot;Anthropic Sans&quot;, -apple-system, &quot;system-ui&quot;, &quot;Segoe UI&quot;, sans-serif;font-size:12px;font-weight:400">/applications 접근</text>

  <!-- Step 2: Middleware checks session -->
  <line x1="230" y1="160" x2="578" y2="160" stroke="#1D9E75" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="404" y="152" style="fill:rgb(194, 192, 182);stroke:none;font-family:&quot;Anthropic Sans&quot;, -apple-system, &quot;system-ui&quot;, &quot;Segoe UI&quot;, sans-serif;font-size:12px;font-weight:400">getUser() — 세션 확인</text>

  <!-- Step 2 return: no user -->
  <line x1="580" y1="200" x2="232" y2="200" stroke="#D85A30" stroke-width="1.5" marker-end="url(#arrow)" stroke-dasharray="5 3"/>
  <text x="406" y="192" style="fill:rgb(194, 192, 182);stroke:none;font-family:&quot;Anthropic Sans&quot;, -apple-system, &quot;system-ui&quot;, &quot;Segoe UI&quot;, sans-serif;font-size:12px;font-weight:400">user: null</text>

  <!-- Step 3: Redirect to login -->
  <line x1="230" y1="240" x2="72" y2="240" stroke="#7F77DD" stroke-width="1.5" marker-end="url(#arrow)" stroke-dasharray="5 3"/>
  <text x="151" y="232" style="fill:rgb(194, 192, 182);stroke:none;font-family:&quot;Anthropic Sans&quot;, -apple-system, &quot;system-ui&quot;, &quot;Segoe UI&quot;, sans-serif;font-size:12px;font-weight:400">302 → /login?redirect=/applications</text>

  <!-- Step 4: User signs in -->
  <line x1="70" y1="280" x2="398" y2="280" stroke="#1D9E75" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="234" y="272" style="fill:rgb(194, 192, 182);stroke:none;font-family:&quot;Anthropic Sans&quot;, -apple-system, &quot;system-ui&quot;, &quot;Segoe UI&quot;, sans-serif;font-size:12px;font-weight:400">signIn(email, password)</text>

  <!-- Step 5: Auth action calls Supabase -->
  <line x1="400" y1="320" x2="578" y2="320" stroke="#1D9E75" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="489" y="312" style="fill:rgb(194, 192, 182);stroke:none;font-family:&quot;Anthropic Sans&quot;, -apple-system, &quot;system-ui&quot;, &quot;Segoe UI&quot;, sans-serif;font-size:12px;font-weight:400">signInWithPassword()</text>

  <!-- Step 5 return -->
  <line x1="580" y1="360" x2="402" y2="360" stroke="#D85A30" stroke-width="1.5" marker-end="url(#arrow)" stroke-dasharray="5 3"/>
  <text x="491" y="352" style="fill:rgb(194, 192, 182);stroke:none;font-family:&quot;Anthropic Sans&quot;, -apple-system, &quot;system-ui&quot;, &quot;Segoe UI&quot;, sans-serif;font-size:12px;font-weight:400">org_members 역할 확인</text>

  <!-- Step 6: Redirect based on role -->
  <line x1="400" y1="400" x2="72" y2="400" stroke="#1D9E75" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="236" y="392" style="fill:rgb(194, 192, 182);stroke:none;font-family:&quot;Anthropic Sans&quot;, -apple-system, &quot;system-ui&quot;, &quot;Segoe UI&quot;, sans-serif;font-size:12px;font-weight:400">운영기관 → /dashboard | 지원자 → /programs</text>
</svg>