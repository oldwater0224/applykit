<svg viewBox="0 0 820 520" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', Arial, sans-serif">
  <defs>
    <style>
      .title { font-size: 16px; font-weight: bold; fill: #1e293b; }
      .actor { font-size: 13px; font-weight: 600; fill: #fff; }
      .msg { font-size: 11px; fill: #334155; }
      .note { font-size: 10px; fill: #475569; }
      .lifeline { stroke: #94a3b8; stroke-width: 1; stroke-dasharray: 6,4; }
      .arrow { stroke: #3b82f6; stroke-width: 1.5; fill: none; marker-end: url(#arrowhead); }
      .arrow-return { stroke: #94a3b8; stroke-width: 1.2; fill: none; stroke-dasharray: 5,3; marker-end: url(#arrowhead-gray); }
    </style>
    <marker id="arrowhead" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#3b82f6"/>
    </marker>
    <marker id="arrowhead-gray" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#94a3b8"/>
    </marker>
  </defs>

  <text x="410" y="30" text-anchor="middle" class="title">DART 데이터 자동 동기화</text>

  <!-- Actors -->
  <rect x="30" y="50" width="120" height="36" rx="6" fill="#2563eb"/>
  <text x="90" y="73" text-anchor="middle" class="actor">Vercel Cron</text>

  <rect x="240" y="50" width="120" height="36" rx="6" fill="#2563eb"/>
  <text x="300" y="73" text-anchor="middle" class="actor">Sync API</text>

  <rect x="450" y="50" width="120" height="36" rx="6" fill="#7c3aed"/>
  <text x="510" y="73" text-anchor="middle" class="actor">OpenDART API</text>

  <rect x="660" y="50" width="120" height="36" rx="6" fill="#059669"/>
  <text x="720" y="73" text-anchor="middle" class="actor">Supabase</text>

  <!-- Lifelines -->
  <line x1="90" y1="86" x2="90" y2="490" class="lifeline"/>
  <line x1="300" y1="86" x2="300" y2="490" class="lifeline"/>
  <line x1="510" y1="86" x2="510" y2="490" class="lifeline"/>
  <line x1="720" y1="86" x2="720" y2="490" class="lifeline"/>

  <!-- Step 1: Cron triggers -->
  <line x1="90" y1="120" x2="292" y2="120" class="arrow"/>
  <text x="190" y="114" text-anchor="middle" class="msg">GET /api/cron/sync (매일 03:00)</text>

  <!-- Step 2: Get companies -->
  <line x1="300" y1="155" x2="712" y2="155" class="arrow"/>
  <text x="500" y="149" text-anchor="middle" class="msg">companies 테이블 corp_code 조회</text>
  <line x1="712" y1="175" x2="308" y2="175" class="arrow-return"/>
  <text x="500" y="169" text-anchor="middle" class="note">corp_code 목록 반환</text>

  <!-- Step 3: Loop - sync each company -->
  <rect x="220" y="195" width="560" height="190" rx="4" fill="none" stroke="#cbd5e1" stroke-width="1"/>
  <rect x="220" y="195" width="80" height="20" rx="3" fill="#e2e8f0"/>
  <text x="260" y="209" text-anchor="middle" class="note">loop [기업별]</text>

  <!-- 3a: Sync company info -->
  <line x1="300" y1="230" x2="502" y2="230" class="arrow"/>
  <text x="400" y="224" text-anchor="middle" class="msg">기업 기본정보 요청</text>
  <line x1="502" y1="248" x2="308" y2="248" class="arrow-return"/>
  <text x="400" y="242" text-anchor="middle" class="note">corp_name, sector, ceo 등</text>

  <!-- 3b: Upsert to Supabase -->
  <line x1="300" y1="275" x2="712" y2="275" class="arrow"/>
  <text x="500" y="269" text-anchor="middle" class="msg">companies upsert</text>

  <!-- 3c: Sync disclosures -->
  <line x1="300" y1="305" x2="502" y2="305" class="arrow"/>
  <text x="400" y="299" text-anchor="middle" class="msg">최근 7일 공시 조회</text>
  <line x1="502" y1="323" x2="308" y2="323" class="arrow-return"/>
  <text x="400" y="317" text-anchor="middle" class="note">공시 목록</text>

  <!-- 3d: Save disclosures -->
  <line x1="300" y1="350" x2="712" y2="350" class="arrow"/>
  <text x="500" y="344" text-anchor="middle" class="msg">disclosures upsert + funding_rounds 자동 생성</text>
  <line x1="712" y1="368" x2="308" y2="368" class="arrow-return"/>
  <text x="500" y="362" text-anchor="middle" class="note">동기화 결과</text>

  <!-- Step 4: Log result -->
  <line x1="300" y1="410" x2="712" y2="410" class="arrow"/>
  <text x="500" y="404" text-anchor="middle" class="msg">sync_logs 기록</text>

  <!-- Step 5: Return -->
  <line x1="292" y1="445" x2="98" y2="445" class="arrow-return"/>
  <text x="190" y="439" text-anchor="middle" class="msg">동기화 완료 응답</text>

  <!-- Footer note -->
  <rect x="240" y="465" width="340" height="24" rx="4" fill="#f1f5f9"/>
  <text x="410" y="481" text-anchor="middle" class="note">재무제표는 매월 1일에만 동기화 (API 호출 절감)</text>
</svg>