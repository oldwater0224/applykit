<svg width="100%" viewBox="0 0 680 480" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="340" y="30" text-anchor="middle" style="fill:rgb(250, 249, 245);stroke:none;font-family:&quot;Anthropic Sans&quot;, -apple-system, &quot;system-ui&quot;, &quot;Segoe UI&quot;, sans-serif;font-size:14px;font-weight:500">1. DART 데이터 자동 동기화</text>

  <!-- Actors -->
  <g>
    <rect x="30" y="55" width="100" height="36" rx="6" stroke-width="0.5" style="fill:rgb(12, 68, 124);stroke:rgb(133, 183, 235)"/>
    <text x="80" y="77" text-anchor="middle" style="fill:rgb(181, 212, 244);stroke:none;font-family:&quot;Anthropic Sans&quot;, -apple-system, &quot;system-ui&quot;, &quot;Segoe UI&quot;, sans-serif;font-size:14px;font-weight:500">Vercel Cron</text>
  </g>
  <g>
    <rect x="190" y="55" width="100" height="36" rx="6" stroke-width="0.5" style="fill:rgb(8, 80, 65);stroke:rgb(93, 202, 165)"/>
    <text x="240" y="77" text-anchor="middle" style="fill:rgb(159, 225, 203);stroke:none;font-family:&quot;Anthropic Sans&quot;, -apple-system, &quot;system-ui&quot;, &quot;Segoe UI&quot;, sans-serif;font-size:14px;font-weight:500">Sync API</text>
  </g>
  <g>
    <rect x="350" y="55" width="120" height="36" rx="6" stroke-width="0.5" style="fill:rgb(60, 52, 137);stroke:rgb(175, 169, 236)"/>
    <text x="410" y="77" text-anchor="middle" style="fill:rgb(206, 203, 246);stroke:none;font-family:&quot;Anthropic Sans&quot;, -apple-system, &quot;system-ui&quot;, &quot;Segoe UI&quot;, sans-serif;font-size:14px;font-weight:500">OpenDART API</text>
  </g>
  <g>
    <rect x="530" y="55" width="100" height="36" rx="6" stroke-width="0.5" style="fill:rgb(113, 43, 19);stroke:rgb(240, 153, 123)"/>
    <text x="580" y="77" text-anchor="middle" style="fill:rgb(245, 196, 179);stroke:none;font-family:&quot;Anthropic Sans&quot;, -apple-system, &quot;system-ui&quot;, &quot;Segoe UI&quot;, sans-serif;font-size:14px;font-weight:500">Supabase</text>
  </g>

  <!-- Lifelines -->
  <line x1="80" y1="91" x2="80" y2="460" stroke-width="1" stroke-dasharray="4 3" style="stroke:rgb(194, 192, 182)"/>
  <line x1="240" y1="91" x2="240" y2="460" stroke-width="1" stroke-dasharray="4 3" style="stroke:rgb(194, 192, 182)"/>
  <line x1="410" y1="91" x2="410" y2="460" stroke-width="1" stroke-dasharray="4 3" style="stroke:rgb(194, 192, 182)"/>
  <line x1="580" y1="91" x2="580" y2="460" stroke-width="1" stroke-dasharray="4 3" style="stroke:rgb(194, 192, 182)"/>

  <!-- Step 1: Cron triggers -->
  <line x1="80" y1="120" x2="238" y2="120" stroke="#1D9E75" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="159" y="112" style="fill:rgb(194, 192, 182);stroke:none;font-family:&quot;Anthropic Sans&quot;, -apple-system, &quot;system-ui&quot;, &quot;Segoe UI&quot;, sans-serif;font-size:12px;font-weight:400">GET /api/cron/sync (매일 03:00)</text>

  <!-- Step 2: Get companies -->
  <line x1="240" y1="160" x2="578" y2="160" stroke="#1D9E75" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="409" y="152" style="fill:rgb(194, 192, 182);stroke:none;font-family:&quot;Anthropic Sans&quot;, -apple-system, &quot;system-ui&quot;, &quot;Segoe UI&quot;, sans-serif;font-size:12px;font-weight:400">companies 테이블 corp_code 조회</text>

  <!-- Step 2 return -->
  <line x1="580" y1="200" x2="242" y2="200" stroke="#D85A30" stroke-width="1.5" marker-end="url(#arrow)" stroke-dasharray="5 3"/>
  <text x="411" y="192" style="fill:rgb(194, 192, 182);stroke:none;font-family:&quot;Anthropic Sans&quot;, -apple-system, &quot;system-ui&quot;, &quot;Segoe UI&quot;, sans-serif;font-size:12px;font-weight:400">corp_code 목록 반환</text>

  <!-- Step 3: Sync company info -->
  <line x1="240" y1="240" x2="408" y2="240" stroke="#1D9E75" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="324" y="232" style="fill:rgb(194, 192, 182);stroke:none;font-family:&quot;Anthropic Sans&quot;, -apple-system, &quot;system-ui&quot;, &quot;Segoe UI&quot;, sans-serif;font-size:12px;font-weight:400">기업 기본정보 요청</text>

  <!-- Step 3 return -->
  <line x1="410" y1="280" x2="242" y2="280" stroke="#7F77DD" stroke-width="1.5" marker-end="url(#arrow)" stroke-dasharray="5 3"/>
  <text x="326" y="272" style="fill:rgb(194, 192, 182);stroke:none;font-family:&quot;Anthropic Sans&quot;, -apple-system, &quot;system-ui&quot;, &quot;Segoe UI&quot;, sans-serif;font-size:12px;font-weight:400">corp_name, sector, ceo</text>

  <!-- Step 4: Upsert companies -->
  <line x1="240" y1="320" x2="578" y2="320" stroke="#1D9E75" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="409" y="312" style="fill:rgb(194, 192, 182);stroke:none;font-family:&quot;Anthropic Sans&quot;, -apple-system, &quot;system-ui&quot;, &quot;Segoe UI&quot;, sans-serif;font-size:12px;font-weight:400">companies upsert + disclosures 저장</text>

  <!-- Step 5: Funding parse -->
  <line x1="580" y1="360" x2="242" y2="360" stroke="#D85A30" stroke-width="1.5" marker-end="url(#arrow)" stroke-dasharray="5 3"/>
  <text x="411" y="352" style="fill:rgb(194, 192, 182);stroke:none;font-family:&quot;Anthropic Sans&quot;, -apple-system, &quot;system-ui&quot;, &quot;Segoe UI&quot;, sans-serif;font-size:12px;font-weight:400">funding_rounds 자동 생성</text>

  <!-- Step 6: Log -->
  <line x1="240" y1="400" x2="578" y2="400" stroke="#1D9E75" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="409" y="392" style="fill:rgb(194, 192, 182);stroke:none;font-family:&quot;Anthropic Sans&quot;, -apple-system, &quot;system-ui&quot;, &quot;Segoe UI&quot;, sans-serif;font-size:12px;font-weight:400">sync_logs 기록</text>

  <!-- Step 7: Return -->
  <line x1="240" y1="440" x2="82" y2="440" stroke="#1D9E75" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="161" y="432" style="fill:rgb(194, 192, 182);stroke:none;font-family:&quot;Anthropic Sans&quot;, -apple-system, &quot;system-ui&quot;, &quot;Segoe UI&quot;, sans-serif;font-size:12px;font-weight:400">동기화 완료 응답</text>
</svg>